<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Product Reviews — Snatched</title>
  <meta name="description" content="Browse AI-verified product reviews from Snatched. Instant Buy, Maybe, or Skip verdicts for Amazon, Sephora and Ulta products." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #FF4D8D;
      --pink-dim: rgba(255,77,141,0.15);
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #222;
      --text: #f0f0f0;
      --muted: #888;
      --border: rgba(255,255,255,0.08);
      --buy: #22c55e;
      --maybe: #eab308;
      --skip: #ef4444;
    }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    nav {
      position: sticky;
      top: 0;
      background: rgba(13,13,13,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }
    .nav-logo { font-weight: 700; font-size: 18px; color: var(--pink); text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-links a { font-size: 14px; font-weight: 500; color: #aaa; text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--pink); }
    .nav-cta {
      background: var(--pink);
      color: #fff !important;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px !important;
    }
    .hero {
      padding: 48px 24px 32px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .hero h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; color: #fff; }
    .hero h1 span { color: var(--pink); }
    .hero p { color: var(--muted); font-size: 15px; max-width: 560px; margin: 0 auto; }
    .content { max-width: 960px; margin: 0 auto; padding: 32px 24px 64px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }
    .card:hover { border-color: var(--pink); background: var(--surface2); }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .card-name { font-size: 16px; font-weight: 700; line-height: 1.35; color: #fff; }
    .retailer-badge {
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 4px 10px; border-radius: 4px;
      background: rgba(255,255,255,0.08); color: #aaa;
      white-space: nowrap; flex-shrink: 0;
    }
    .verdict {
      display: inline-block;
      font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 4px 12px; border-radius: 100px;
      width: fit-content;
    }
    .verdict-buy { background: rgba(34,197,94,0.15); color: var(--buy); }
    .verdict-maybe { background: rgba(234,179,8,0.15); color: var(--maybe); }
    .verdict-skip { background: rgba(239,68,68,0.15); color: var(--skip); }
    .card-summary { font-size: 13px; color: #bbb; line-height: 1.5; }
    .card-review-link { text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 10px; flex: 1; }
    .shop-link { display:inline-block; margin-top:12px; color:#FF4D8D; font-size:13px; font-weight:600; text-decoration:none; }
    .shop-link:hover { text-decoration:underline; }
    .status { text-align: center; color: var(--muted); padding: 48px 24px; font-size: 15px; }
    .status.error { color: var(--skip); }
    @media (max-width: 600px) {
      .hero h1 { font-size: 26px; }
      .nav-links a:not(.nav-cta) { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Snatched</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/picks/">Picks</a>
      <a href="/reviews/">Reviews</a>
      <a href="https://chromewebstore.google.com/detail/snatched/hcdlgnlefjhejhlpgmmgmehknekphamm" target="_blank" class="nav-cta">Get Extension →</a>
    </div>
  </nav>

  <div class="hero">
    <h1>AI <span>Product Reviews</span></h1>
    <p>Real reviews analyzed by Snatched — Buy, Maybe, or Skip verdicts for beauty and skincare products.</p>
  </div>

  <div class="content">
    <div id="status" class="status">Loading reviews…</div>
    <div id="grid" class="grid" hidden></div>
  </div>

  <script>
    const API = 'https://snatched-api.vercel.app/api/reviews';

    function field(obj, ...keys) {
      for (const k of keys) {
        if (obj != null && obj[k] != null && obj[k] !== '') return obj[k];
      }
      return null;
    }

    function verdictClass(verdict) {
      const v = String(verdict || '').toLowerCase();
      if (v === 'buy') return 'verdict-buy';
      if (v === 'skip') return 'verdict-skip';
      return 'verdict-maybe';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function slugify(name) {
      return name
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 120)
        .replace(/-+$/g, '');
    }

    function renderCard(review) {
      const name = field(review, 'productName', 'product_name', 'name') || 'Product';
      const retailer = field(review, 'retailer', 'store', 'site') || 'Retailer';
      const verdict = field(review, 'verdict', 'recommendation') || 'Maybe';
      const summary = field(review, 'summary', 'oneLiner', 'one_liner', 'description') || '';
      const slug = field(review, 'slug', 'id') || slugify(name);

      const item = review;
      const displayName = name.length > 60 ? name.slice(0, 57) + '...' : name;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML =
        '<a class="card-review-link" href="/reviews/' + encodeURIComponent(slug) + '/">' +
          '<div class="card-top">' +
            '<div class="card-name">' + escapeHtml(displayName) + '</div>' +
            '<span class="retailer-badge">' + escapeHtml(retailer) + '</span>' +
          '</div>' +
          '<span class="verdict ' + verdictClass(verdict) + '">' + escapeHtml(verdict) + '</span>' +
          '<p class="card-summary">' + escapeHtml(summary) + '</p>' +
        '</a>' +
        '<a class="shop-link" href="https://www.amazon.com/s?k=' + encodeURIComponent(item.product_name || '') + '&tag=snatchedapp20-20" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">Shop on Amazon ↗</a>';
      return card;
    }

    const SUBCATEGORY_ORDER = ['skincare', 'makeup', 'haircare'];
    const SUBCATEGORY_LABELS = {
      skincare: 'Skincare',
      makeup: 'Makeup',
      haircare: 'Hair Care',
    };

    const HAIR_KEYWORDS = [
      'dry shampoo', 'heat protectant', 'hair spray', 'hairspray',
      'shampoo', 'conditioner', 'hair', 'scalp', 'curl', 'wave', 'mousse',
    ];
    const MAKEUP_KEYWORDS = [
      'lip gloss', 'lip tint', 'setting spray', 'lip balm', 'lip mask',
      'foundation', 'concealer', 'mascara', 'lipstick', 'blush', 'bronzer',
      'highlighter', 'eyeshadow', 'eyeliner', 'primer', 'powder', 'contour',
    ];

    function getProductName(review) {
      return field(review, 'productName', 'product_name', 'name') || '';
    }

    function getSubcategoryKey(review) {
      const name = getProductName(review).toLowerCase();
      if (HAIR_KEYWORDS.some((kw) => name.includes(kw))) return 'haircare';
      if (MAKEUP_KEYWORDS.some((kw) => name.includes(kw))) return 'makeup';
      return 'skincare';
    }

    async function loadReviews() {
      const status = document.getElementById('status');
      const grid = document.getElementById('grid');

      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error('Failed to load reviews');
        const data = await res.json();
        const reviews = (Array.isArray(data) ? data : (data.reviews || []))
          .filter((review) => {
            const summary = field(review, 'summary', 'oneLiner', 'one_liner', 'description');
            return summary != null && summary !== '';
          });

        if (!reviews.length) {
          status.textContent = 'No reviews yet — check back soon.';
          return;
        }

        const grouped = {};
        reviews.forEach((review) => {
          const key = getSubcategoryKey(review);
          if (!grouped[key]) grouped[key] = [];
          grouped[key].push(review);
        });

        grid.innerHTML = '';
        grid.className = '';

        let firstSection = true;
        SUBCATEGORY_ORDER.forEach((key) => {
          const items = grouped[key];
          if (!items || !items.length) return;

          items.sort((a, b) =>
            getProductName(a).localeCompare(getProductName(b), undefined, { sensitivity: 'base' })
          );

          const header = document.createElement('h2');
          header.textContent = SUBCATEGORY_LABELS[key];
          header.style.fontWeight = '700';
          header.style.fontSize = '20px';
          header.style.color = '#fff';
          header.style.marginBottom = '16px';
          header.style.marginTop = firstSection ? '0' : '40px';

          const cardGrid = document.createElement('div');
          cardGrid.className = 'grid';
          items.forEach((review) => cardGrid.appendChild(renderCard(review)));

          grid.appendChild(header);
          grid.appendChild(cardGrid);
          firstSection = false;
        });

        status.hidden = true;
        grid.hidden = false;
      } catch (err) {
        status.textContent = 'Could not load reviews. Please try again later.';
        status.classList.add('error');
      }
    }

    loadReviews();
  </script>

</body>
</html>
