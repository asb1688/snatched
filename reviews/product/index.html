<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Review — Snatched</title>
  <meta name="description" content="AI-verified product review from Snatched." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #FF4D8D;
      --pink-dim: rgba(255,77,141,0.15);
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #222;
      --text: #f0f0f0;
      --muted: #888;
      --border: rgba(255,255,255,0.08);
      --buy: #22c55e;
      --maybe: #eab308;
      --skip: #ef4444;
    }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    nav {
      position: sticky;
      top: 0;
      background: rgba(13,13,13,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }
    .nav-logo { font-weight: 700; font-size: 18px; color: var(--pink); text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-links a { font-size: 14px; font-weight: 500; color: #aaa; text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--pink); }
    .nav-cta {
      background: var(--pink);
      color: #fff !important;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px !important;
    }
    .content { max-width: 720px; margin: 0 auto; padding: 40px 24px 64px; }
    .back-link {
      display: inline-block;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--pink); }
    .header { margin-bottom: 28px; }
    .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 12px; }
    .product-name { font-size: 28px; font-weight: 700; line-height: 1.2; color: #fff; }
    .retailer-badge {
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 4px 10px; border-radius: 4px;
      background: rgba(255,255,255,0.08); color: #aaa;
      white-space: nowrap; flex-shrink: 0; margin-top: 6px;
    }
    .verdict {
      display: inline-block;
      font-size: 14px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 6px 16px; border-radius: 100px;
    }
    .verdict-buy { background: rgba(34,197,94,0.15); color: var(--buy); }
    .verdict-maybe { background: rgba(234,179,8,0.15); color: var(--maybe); }
    .verdict-skip { background: rgba(239,68,68,0.15); color: var(--skip); }
    .summary {
      font-size: 16px;
      line-height: 1.7;
      color: #ccc;
      margin-bottom: 32px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }
    .section-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--pink);
      margin-bottom: 12px;
    }
    .pros-cons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }
    .pros-cons-col {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }
    .pros-cons-col h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: #fff; }
    .pros-cons-col ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .pros-cons-col li { font-size: 14px; color: #bbb; line-height: 1.5; padding-left: 16px; position: relative; }
    .pros-cons-col li::before { content: '·'; position: absolute; left: 0; color: var(--pink); font-weight: 700; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
    .pill {
      font-size: 12px; font-weight: 600;
      padding: 6px 14px; border-radius: 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: #ccc;
    }
    .pill span { color: var(--pink); }
    .clean-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
    .clean-badge {
      font-size: 12px; font-weight: 600;
      padding: 6px 14px; border-radius: 100px;
      background: var(--pink-dim);
      color: var(--pink);
      border: 1px solid rgba(255,77,141,0.25);
    }
    .clean-badge.no { background: rgba(255,255,255,0.05); color: var(--muted); border-color: var(--border); }
    .comparable {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 32px;
    }
    .comparable p { font-size: 14px; color: #bbb; margin-top: 6px; line-height: 1.5; }
    .comparable a { color: var(--pink); text-decoration: none; font-weight: 600; }
    .comparable a:hover { text-decoration: underline; }
    .cta-wrap { text-align: center; padding-top: 8px; }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--pink); color: #fff;
      padding: 16px 32px; border-radius: 100px;
      font-size: 16px; font-weight: 600;
      text-decoration: none; transition: opacity 0.2s;
    }
    .cta-btn:hover { opacity: 0.9; }
    .status { text-align: center; color: var(--muted); padding: 80px 24px; font-size: 15px; }
    .status.error { color: var(--skip); }
    @media (max-width: 600px) {
      .pros-cons { grid-template-columns: 1fr; }
      .product-name { font-size: 22px; }
      .nav-links a:not(.nav-cta) { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Snatched</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/reviews/">Reviews</a>
      <a href="https://chromewebstore.google.com/detail/snatched/hcdlgnlefjhejhlpgmmgmehknekphamm" target="_blank" class="nav-cta">Get Extension →</a>
    </div>
  </nav>

  <div class="content">
    <div id="status" class="status">Loading review…</div>
    <div id="review" hidden>
      <a href="/reviews/" class="back-link">← All reviews</a>
      <div class="header">
        <div class="header-top">
          <h1 class="product-name" id="productName"></h1>
          <span class="retailer-badge" id="retailer"></span>
        </div>
        <span class="verdict" id="verdict"></span>
      </div>
      <p class="summary" id="summary"></p>

      <div class="section-label">Pros & Cons</div>
      <div class="pros-cons">
        <div class="pros-cons-col">
          <h3>Pros</h3>
          <ul id="pros"></ul>
        </div>
        <div class="pros-cons-col">
          <h3>Cons</h3>
          <ul id="cons"></ul>
        </div>
      </div>

      <div class="section-label">Review Stats</div>
      <div class="pill-row" id="stats"></div>

      <div class="section-label">Clean Beauty Check</div>
      <div class="clean-row" id="cleanBeauty"></div>

      <div class="section-label">Comparable Pick</div>
      <div class="comparable" id="comparable"></div>

      <div class="cta-wrap">
        <a href="https://chromewebstore.google.com/detail/snatched/hcdlgnlefjhejhlpgmmgmehknekphamm" target="_blank" class="cta-btn">
          Run this through Snatched →
        </a>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://snatched-api.vercel.app/api/reviews';
    const CHROME_STORE = 'https://chromewebstore.google.com/detail/snatched/hcdlgnlefjhejhlpgmmgmehknekphamm';

    function field(obj, ...keys) {
      for (const k of keys) {
        if (obj != null && obj[k] != null && obj[k] !== '') return obj[k];
      }
      return null;
    }

    function getSlug() {
      const params = new URLSearchParams(location.search);
      if (params.get('slug')) return params.get('slug');

      const parts = location.pathname.replace(/\/$/, '').split('/').filter(Boolean);
      const reviewsIdx = parts.indexOf('reviews');
      if (reviewsIdx >= 0) {
        const segment = parts[reviewsIdx + 1];
        if (segment && segment !== 'product' && segment !== 'index.html') {
          return decodeURIComponent(segment);
        }
      }
      return null;
    }

    function verdictClass(verdict) {
      const v = String(verdict || '').toLowerCase();
      if (v === 'buy') return 'verdict-buy';
      if (v === 'skip') return 'verdict-skip';
      return 'verdict-maybe';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function normalizeList(val) {
      if (!val) return [];
      if (Array.isArray(val)) return val.map(String);
      if (typeof val === 'string') return val.split(/[,;]\s*/).filter(Boolean);
      return [];
    }

    function renderList(el, items, emptyText) {
      el.innerHTML = '';
      const list = normalizeList(items);
      if (!list.length) {
        el.innerHTML = '<li>' + escapeHtml(emptyText) + '</li>';
        return;
      }
      list.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        el.appendChild(li);
      });
    }

    function renderStats(el, stats) {
      el.innerHTML = '';
      if (!stats) return;

      let entries = [];
      if (Array.isArray(stats)) {
        entries = stats.map(s => ({
          label: field(s, 'label', 'name', 'key') || 'Stat',
          value: field(s, 'value', 'rating', 'score') || ''
        }));
      } else if (typeof stats === 'object') {
        entries = Object.entries(stats).map(([k, v]) => ({
          label: k.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase()),
          value: v
        }));
      }

      entries.forEach(({ label, value }) => {
        if (value == null || value === '') return;
        const pill = document.createElement('span');
        pill.className = 'pill';
        pill.innerHTML = '<span>' + escapeHtml(label) + '</span> · ' + escapeHtml(String(value));
        el.appendChild(pill);
      });
    }

    function renderCleanBeauty(el, clean) {
      el.innerHTML = '';
      if (!clean) return;

      const labels = {
        fragranceFree: 'Fragrance-free',
        parabenFree: 'Paraben-free',
        vegan: 'Vegan',
        crueltyFree: 'Cruelty-free',
        fragrance_free: 'Fragrance-free',
        paraben_free: 'Paraben-free',
        cruelty_free: 'Cruelty-free'
      };

      if (Array.isArray(clean)) {
        clean.forEach(item => {
          const badge = document.createElement('span');
          badge.className = 'clean-badge';
          badge.textContent = typeof item === 'string' ? item : (item.label || item.name || 'Check');
          el.appendChild(badge);
        });
        return;
      }

      Object.entries(clean).forEach(([key, val]) => {
        const badge = document.createElement('span');
        const label = labels[key] || key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
        const pass = val === true || String(val).toLowerCase() === 'yes' || String(val).toLowerCase() === 'pass';
        badge.className = 'clean-badge' + (pass ? '' : ' no');
        badge.textContent = label + (pass ? ' ✓' : ' ✗');
        el.appendChild(badge);
      });
    }

    function renderComparable(el, comparable) {
      el.innerHTML = '';
      if (!comparable) {
        el.innerHTML = '<p>No comparable pick available.</p>';
        return;
      }

      if (typeof comparable === 'string') {
        el.innerHTML = '<p>' + escapeHtml(comparable) + '</p>';
        return;
      }

      const name = field(comparable, 'name', 'productName', 'product_name', 'title') || 'Comparable product';
      const reason = field(comparable, 'reason', 'summary', 'description') || '';
      const url = field(comparable, 'url', 'link', 'href');

      let html = '<strong>' + escapeHtml(name) + '</strong>';
      if (reason) html += '<p>' + escapeHtml(reason) + '</p>';
      if (url) html += '<a href="' + escapeHtml(url) + '" target="_blank">View on retailer ↗</a>';
      el.innerHTML = html;
    }

    function updateSeo(review) {
      const name = field(review, 'productName', 'product_name', 'name') || 'Product';
      const verdict = field(review, 'verdict', 'recommendation') || 'Maybe';
      const summary = field(review, 'summary', 'oneLiner', 'one_liner', 'description') || '';

      document.title = name + ' Review — AI Says ' + verdict + ' | Snatched';

      let meta = document.querySelector('meta[name="description"]');
      if (!meta) {
        meta = document.createElement('meta');
        meta.name = 'description';
        document.head.appendChild(meta);
      }
      meta.content = summary;
    }

    function showReview(review) {
      const name = field(review, 'productName', 'product_name', 'name') || 'Product';
      const retailer = field(review, 'retailer', 'store', 'site') || 'Retailer';
      const verdict = field(review, 'verdict', 'recommendation') || 'Maybe';
      const summary = field(review, 'summary', 'oneLiner', 'one_liner', 'description') || '';

      updateSeo(review);

      document.getElementById('productName').textContent = name;
      document.getElementById('retailer').textContent = retailer;
      const verdictEl = document.getElementById('verdict');
      verdictEl.textContent = verdict;
      verdictEl.className = 'verdict ' + verdictClass(verdict);
      document.getElementById('summary').textContent = summary;

      renderList(document.getElementById('pros'), field(review, 'pros', 'pro'), 'No pros listed.');
      renderList(document.getElementById('cons'), field(review, 'cons', 'con'), 'No cons listed.');
      renderStats(document.getElementById('stats'), field(review, 'stats', 'ratings', 'breakdown'));
      renderCleanBeauty(document.getElementById('cleanBeauty'), field(review, 'cleanBeauty', 'clean_beauty', 'cleanBeautyCheck', 'clean_beauty_check'));
      renderComparable(document.getElementById('comparable'), field(review, 'comparablePick', 'comparable_pick', 'comparable', 'alternative'));

      document.getElementById('status').hidden = true;
      document.getElementById('review').hidden = false;
    }

    async function loadReview() {
      const slug = getSlug();
      const status = document.getElementById('status');

      if (!slug) {
        status.textContent = 'Review not found.';
        status.classList.add('error');
        return;
      }

      try {
        const res = await fetch(API + '?slug=' + encodeURIComponent(slug));
        if (!res.ok) throw new Error('Not found');
        const data = await res.json();
        const review = Array.isArray(data) ? data[0] : (data.review || data);

        if (!review || typeof review !== 'object') throw new Error('Not found');
        showReview(review);
      } catch (err) {
        status.textContent = 'Review not found.';
        status.classList.add('error');
      }
    }

    loadReview();
  </script>

</body>
</html>
